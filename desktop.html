<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./logo-polaryon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polaryon - Terminal de Combate</title>
    <!-- Fontes Táticas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      // WATCHDOG TÁTICO: Se o robô não carregar em 15s, soa o alarme
      window.WATCHDOG_TIMER = setTimeout(function() {
        const root = document.getElementById('root');
        if (!root || root.innerHTML.length < 10) {
          alert('🚨 FALHA NA CARGA DO SISTEMA!\n\nProvavelmente o caminho da pasta contém acentos ou caracteres especiais que o Windows não consegue processar.\n\nSOLUÇÃO: Mova a pasta do sistema para um lugar simples, como C:\\Polaryon e tente abrir novamente.');
        }
      }, 15000);
    </script>
  </head>
  <body class="bg-[#020817] text-white">
    <div id="root"></div>
    <script type="module" src="./src/main-desktop.tsx"></script>
  </body>
</html>
